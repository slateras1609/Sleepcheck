name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install yarn dependencies
        working-directory: frontend
        run: yarn install --no-immutable
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

      - name: Create .env file
        working-directory: frontend
        run: |
          echo "EXPO_PUBLIC_BACKEND_URL=${{ secrets.EXPO_PUBLIC_BACKEND_URL }}" > .env

      - name: Generate native Android project
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches

      - name: Make Gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleepcheck-debug-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
